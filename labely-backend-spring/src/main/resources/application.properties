spring.application.name=demo
server.port=8081

# NeonDB PostgreSQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Cloudflare R2 Configuration
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY}
cloudflare.r2.bucket-name=labely-images
cloudflare.r2.account-id=8bebf1940c7d514a997005bb843dedf9
cloudflare.r2.endpoint=https://8bebf1940c7d514a997005bb843dedf9.r2.cloudflarestorage.com
cloudflare.r2.public-url=https://pub-278283f5e04b460180af4eb13ff5fbf0.r2.dev

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# SAM3 FastAPI Configuration
sam3.base-url=${SAM3_BASE_URL:http://localhost:8000}
sam3.default-mode=sam3
sam3.default-conf-threshold=0.35
sam3.request-timeout-ms=120000

# DefectX FastAPI Configuration
defectx.base-url=${DEFECTX_BASE_URL:http://localhost:8100}
defectx.request-timeout-ms=180000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:4000,http://127.0.0.1:4000,https://labely.kodrum.dev
